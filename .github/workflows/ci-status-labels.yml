name: CI Status Labels

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read

jobs:
  label:
    name: Label PR CI Status
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Download CI PR metadata
        uses: actions/download-artifact@v8.0.1
        continue-on-error: true
        with:
          name: ci-pr-metadata
          path: ci-pr-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Apply CI status labels
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const { applyCiStatusLabels } = require('./.github/scripts/ci-status-labels');
            await applyCiStatusLabels({ github, context, core });
