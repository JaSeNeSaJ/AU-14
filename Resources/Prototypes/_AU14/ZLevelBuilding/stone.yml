# Building overhaul (z-level): underground stone + debris.

# Minable cave rock for dug-out levels. Inherits AsteroidRock's mining behaviour (drops salvageable materials)
# but wears the CM cave-wall look instead of the vanilla asteroid sprite, to match maps like Barker's Lament.
- type: entity
  parent: AsteroidRock
  id: AU14CaveRock
  name: rock
  suffix: AU14 z-build
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Walls/cave.rsi
    color: "#826161"
    state: cavewall
  - type: Icon
    sprite: _RMC14/Structures/Walls/cave.rsi
    state: cavewall

# Loose rock flung outward when a cave-in starts (before the roof buries the cavern). Salvage flavour.
# Borrows ONLY the SteelOre1 (iron ore) sprite, tinted darker and scaled down so it reads as a small rock chunk.
- type: entity
  parent: BaseItem
  id: AU14RockDebris
  name: rock debris
  suffix: AU14 z-build
  description: A chunk of rock thrown loose by a cave-in.
  components:
  - type: Sprite
    sprite: Objects/Materials/ore.rsi
    state: iron
    color: "#6b6b6b"
    scale: 0.7, 0.7

# Collapse atmosphere: waterfall-mist fog, but see-through (Occluder off) and non-blocking, auto-despawns.
- type: entity
  parent: CMUFogWallLamentWaterfallMist
  id: AU14CollapseFog
  suffix: AU14 z-build, collapse
  components:
  - type: Occluder
    enabled: false
  - type: Physics
    canCollide: false
  - type: TimedDespawn
    lifetime: 6

# Collapse effect: the animated big-red rockstorm sprite, tinted slightly darker, auto-despawns per burst.
- type: entity
  parent: RMCBigRedRocksProp
  id: AU14CollapseRockProp
  suffix: AU14 z-build, collapse
  components:
  - type: Sprite
    color: "#aaaaaa"
  - type: TimedDespawn
    lifetime: 1.5
