- type: entity
  parent: RMCPouchMagazineLargePMC
  id: AU14PouchMagazineLargePARTDual
  name: Prodigy dual large magazine pouch
  description: A large pouch designed to hold four large magazines, and 4 handfulls of shotgun shells. The pouch is designed for the Prodigy Armed Repair Teams, and is often used by their engineers and medics to hold extra magazines and shotgun shells.
  suffix: PART
  components:
  - type: Storage
    grid:
    - 0,0,11,1 #8 slots
  - type: LimitedStorage
    limits:
    - popup: au14-storage-limit-max-mags-prodigy
      count: 4
      whitelist:
        tags:
        - CMMagazineRifle
        - AU14MagazineRifleM20A
        - CMMagazinePistol
        - CMMagazinePistolMK80
    - popup: au14-storage-limit-max-shells-prodigy
      count: 4
      whitelist:
        tags:
        - RMCHandful
        - Cartridge
        - CMMagazinePistol
        - RMCShellShotgun

