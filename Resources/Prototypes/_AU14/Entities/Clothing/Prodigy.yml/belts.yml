      - Wrench
      - CableCoil
      - Multitool
      - Flashlight
      - Sidearm
      - CMMagazinePistol
      - RMCMagazineRevolver
      - PowerCell
      - CMFireExtinguisherPortable
      - RMCShellShotgun
      - RMCNailgunCompact
      - RMCNailgunTactical
