# LAWS (marine)
- type: entity
  parent: RMCGuidebookBase
  id: AU14GuidebookLawMarine
  name: uniform code of military justice
  description: "Usually being the favorite read of any member of the Military Police of the military, it's whole meaning is to work as the scales for the sword of justice that brandishes onboard the vessels of many militaries, so peace and order can be maintained. It's nicknames may include but are not limited to: Devil's Red Book, Bible of All Sinners, THE Book, UCMJ, Red Brick, Torture Manual, Red Devil's Torture Bible of All Sinners."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/Books/Other/marine_law.rsi
  - type: GuideHelp
    guides:
    - AU14UCMJ

# LAWS (colonial)
- type: entity
  parent: RMCGuidebookBase
  id: AU14GuidebookLawColonial
  name: colonial civil code
  description: "A thick, well-thumbed but battered volume bearing the seal of the Orbital Court and the Colonial Administration. The historical first-edition of the Colonial Civil Code, printed long before the latest reforms. Its pages are considered dated being full of precedents that modern jurists dispute with dubious legal reasoning and clauses that have never been updated. No two lawyers can agree on what half of it actually means, still, every colonial office seems to have one, and it remains in circulation as a reminder that law is a living thing. It is affectionately called: 'The Blue Book'."
  components:
  - type: Sprite
    sprite: _AU14/Objects/Misc/Books/cclaw.rsi
  - type: GuideHelp
    guides:
    - AU14CCLaw

