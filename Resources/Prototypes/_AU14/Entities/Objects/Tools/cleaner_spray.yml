- type: entity
  parent: SprayBottleSpaceCleaner
  id: AU14SprayCleaner
  name: cleaner spray
  description: A spray bottle filled with a cleaning solution. It is used to clean various surfaces and objects.
  components:
  - type: Sprite
    sprite: _AU14/Objects/Tools/cleaner_spray.rsi
    state: cleaner
  - type: Item
    sprite: _AU14/Objects/Tools/cleaner_spray.rsi

- type: entity
  parent: AU14SprayCleaner
  id: AU14SprayCleanerBig
  name: big cleaner spray
  description: A large spray bottle filled with a cleaning solution. It is used to clean various surfaces and objects.
  components:
  - type: Sprite
    sprite: _AU14/Objects/Tools/cleaner_spray.rsi
    state: cleaner_large
  - type: SolutionContainerManager
    solutions:
      spray:
        maxVol: 300
        reagents:
        - ReagentId: SpaceCleaner
          Quantity: 300

- type: entity
  parent: AU14SprayCleaner
  id: AU14SprayCleanerExperimental
  name: experimental cleaner spray
  description: An experimental spray bottle filled with an cleaning solution. It's capable of self-regenerating the cleaning solution by harvesting ambient compounds from the surrounding atmosphere. It is used to clean various surfaces and objects.
  components:
  - type: Sprite
    sprite: _AU14/Objects/Tools/cleaner_spray.rsi
    state: cleaner_special
  - type: SolutionContainerManager
    solutions:
      spray:
        maxVol: 300
        reagents:
        - ReagentId: SpaceCleaner
          Quantity: 300
  - type: SolutionRegeneration
    solution: spray
    generated:
      reagents:
      - ReagentId: SpaceCleaner
        Quantity: 1
