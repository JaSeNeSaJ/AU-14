      - id: CMMagazinePistolM1984
        amount: 30
        points: 1
      - id: RMCMagazinePistolB92FS
        amount: 20
        points: 1
      - id: RMCMagazinePistolHoldout
        amount: 30
        points: 1
      - id: RMCSpeedLoaderM44
        amount: 30
        points: 1
      - id: RMCSpeedLoader44Marksman
        amount: 2
