#spawns

# Example CLF objective-point vendor.
# Mirrors the CLF weapons rack but costs are paid from the CLF faction win-point pool.
# Each entry's "points" value is the win-point cost to purchase it.
- type: entity
  parent: ColMarTechBase
  id: AU14CLFObjectiveWeaponsVendor
  name: CLF Requisitions Rack
  description: A high-value weapons cache accessible only with CLF operational funds.
  suffix: CLF, Objective Points
  components:
  - type: Pullable
  - type: Sprite
    sprite: _AU14/Structures/Vendors/genericweaponrack.rsi
    layers:
    - state: "base"
      map: [ "enum.VendingMachineVisualLayers.BaseUnshaded", "enum.VendingMachineVisualLayers.Base" ]
  - type: CMAutomatedVendor
    useObjectivePoints: true
    faction: clf
    sections:
    - name: Rifles
      entries:
      - id: AU14WeaponRifleM16A1
        amount: 2
        points: 5
      - id: AU14WeaponRifleM16A2
        amount: 3
        points: 5
      - id: AU14WeaponRifleAR10
        amount: 3
        points: 4
      - id: RMCWeaponBoltActionRifle
        amount: 3
        points: 2
      - id: WeaponRifleMAR40
        amount: 2
        points: 10
      - id: RMCWeaponRifleType71C
        amount: 1
        points: 3
    - name: Shotguns
      entries:
      - id: RMCWeaponShotgunHG3712
        amount: 1
        points: 5
      - id: WeaponShotgunM357Sawn
        amount: 2
        points: 6
      - id: WeaponShotgunM357
        amount: 3
        points: 5
    - name: Handguns
      entries:
      - id: CMWeaponPistolM1984Empty
        amount: 3
        points: 3
      - id: RMCWeaponPistolB92FS
        amount: 2
        points: 4
      - id: RMCWeaponRevolverM44
        amount: 3
        points: 4
      - id: RMCWeaponPistolHoldout
        amount: 6
        points: 2
      - id: RMCWeaponPistolD18
