        amount: 1
        points: 10
      - id: RMCWeaponMar50LMG
        amount: 1
        points: 16
    - name: Rifle Ammunition
      entries:
      - id: RMCMagazineRifleM16
        amount: 85
        points: 1
      - id: RMCMagazineRifleHunting
        amount: 25
        points: 1
      - id: RMCMagazineRifleMAR40
        amount: 35
        points: 1
      - id: RMCMagazineMar50LMG
        amount: 2
        points: 3
      - id: RMCMagazineLMGM60
        amount: 5
        points: 2
      - id: RMCMagazineRifleType71
        amount: 9
