# NPC + IFF faction for abominations.
# Hostile to everything except itself; kept separate from RMCXeno so the
# two threats can coexist without friendly-firing each other.
- type: npcFaction
  id: Abomination
  hostile:
  - UNMC
  - NanoTrasen
  - SPP
  - GOVFOR
  - OPFOR
  - Halcyon
  - WeYa
  - Civilian
  - CLF
  - TSE
  - AUColonist
  - CMUAPE
  - RMCXeno

- type: entity
  id: FactionAbomination
  categories: [ HideSpawnMenu ]
  components:
  - type: IFFFaction

# Abstract base for every abomination mob. Built from the core mob mixins
# (BaseMob / MobDamageable / MobCombat / MobBloodstream / MobFlammable),
# NOT from anything xeno-related. Abominations are a separate threat and
# do not share any xeno systems (no plasma, no hive, no evolution).
- type: entity
  abstract: true
  parent:
  - BaseMob
  - MobDamageable
  - MobCombat
  - MobBloodstream
  - MobFlammable
  id: AU14AbominationBase
  name: abomination
  components:
  - type: Abomination
  - type: NoSlip
  - type: Climbing
  - type: ComplexInteraction
  - type: Emoting
  - type: TypingIndicator
    proto: alien
  - type: MobCollision
  - type: RMCMobCollision
  - type: StatusEffects
    allowed:
    - Stun
    - KnockedDown
    - SlowedDown
    - Muted
    - Dazed
    - Blinded
    - Unconscious
    - TemporaryBlindness
    - Deaf
  # Only the skitter has hands (added in skitter.yml). Spider, grunt and the
  # combat-form mimic intentionally have no fingers.
  - type: Body
    prototype: Primate
    requiredLegs: 1
  - type: NpcFactionMember
    factions:
    - Abomination
  - type: UserIFF
    factions:
    - FactionAbomination
  - type: GhostTakeoverAvailable
  - type: GhostRole
    name: Abomination
    description: A twisted mass of flesh hungry for prey.
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    raffle:
      settings: short
  # Heavy slash melee — Slash damage routes through the CMU bodypart system's
  # BruteGroup -> SeveranceDamage path, so all abominations have a high
  # built-in limb-sever chance. Individual mobs override the damage value.
  - type: MeleeWeapon
    soundHit:
      collection: RCMXenoClaw
    soundSwing:
      path: /Audio/_RMC14/Weapons/alien_claw_swipe.ogg
      params:
        variation: 0.1
        volume: -5
    angle: 0
    animation: RMCWeaponArcXenoClaw
    damage:
      types:
        Slash: 12
  - type: Speech
    speechVerb: Abomination
    speechSounds: Bass
  # No ReplacementAccent — abominations speak cleanly on their radio
  # (replacement accents fire on AccentGetEvent, which runs through the
  # radio chat path; an accent here would garble their hivemind comms).
  # Abomination radio channel — see abominationRoles.yml.
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - Abomination
  - type: ActiveRadio
    channels:
    - Abomination
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_RMC14/Interface/map_blips.rsi
      state: warrior
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 4
  - type: NameIdentifier
    group: Abomination

- type: nameIdentifierGroup
  id: Abomination
  maxValue: 999
  prefix: Abomination
