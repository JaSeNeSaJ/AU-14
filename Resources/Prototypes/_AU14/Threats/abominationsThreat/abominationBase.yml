# NPC + IFF faction for abominations.
# Hostile to everything except itself; kept separate from RMCXeno so the
# two threats can coexist without friendly-firing each other.
- type: npcFaction
  id: Abomination
  hostile:
  - UNMC
  - NanoTrasen
  - SPP
  - GOVFOR
  - OPFOR
  - Halcyon
  - WeYa
  - Civilian
  - CLF
  - TSE
  - AUColonist
  - CMUAPE
  - RMCXeno

- type: entity
  id: FactionAbomination
  categories: [ HideSpawnMenu ]
  components:
  - type: IFFFaction

# Abstract base for every abomination mob. We inherit the xeno-base
# *chassis* (hands, speech, ghost takeover, doafter, melee plumbing) but
# strip the components that make the engine consider the entity a
# xenomorph. Abominations are a separate threat, not part of the hive.
- type: entity
  abstract: true
  parent:
  - CMXenoDeveloped
  - CMXenoFlammable
  - RMCXenoMobCollision
  id: AU14AbominationBase
  name: abomination
  components:
  # Strip xeno-defining components inherited from the chassis. They have
  # to come off so HUDs, role registration and hive systems don't tag
  # these mobs as xenos.
  - type: RemoveComponents
    components:
    # Dummy role just to satisfy the [DataField(required: true)] on XenoComponent.Role
    # while RemoveComponents deserialises the entry; the component is stripped at spawn.
    - type: Xeno
      role: CMXenoLarva
    - type: XenoRegen
    - type: XenoEvolution
    - type: XenoStateVisuals
    - type: HiveTracker
    - type: AssignXenoName
    - type: XenoFriendly
    - type: AffectableByWeeds
  - type: Abomination
  - type: GhostTakeoverAvailable
  - type: GhostRole
    name: Abomination
    description: A twisted mass of flesh hungry for prey.
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    raffle:
      settings: short
  - type: NpcFactionMember
    factions:
    - Abomination
  - type: UserIFF
    factions:
    - FactionAbomination
  - type: Speech
    speechVerb: Abomination
    speechSounds: Bass
  - type: ReplacementAccent
    accent: genericAggressive
  # Replaces the Hivemind channel inherited from CMXenoDeveloped so abominations
  # don't share the xeno hive radio.
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - Abomination
  - type: ActiveRadio
    channels:
    - Abomination
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_RMC14/Interface/map_blips.rsi
      state: warrior
