# NPC + IFF faction for abominations.
# Hostile to everything except itself; kept separate from RMCXeno so the
# two threats can coexist without friendly-firing each other.
- type: npcFaction
  id: Abomination
  hostile:
  - UNMC
  - NanoTrasen
  - SPP
  - GOVFOR
  - OPFOR
  - Halcyon
  - WeYa
  - Civilian
  - CLF
  - TSE
  - AUColonist
  - CMUAPE
  - RMCXeno

- type: entity
  id: FactionAbomination
  categories: [ HideSpawnMenu ]
  components:
  - type: IFFFaction

# Abstract base for every abomination mob. Built from the core mob mixins
# (BaseMob / MobDamageable / MobCombat / MobBloodstream / MobFlammable),
# NOT from anything xeno-related. Abominations are a separate threat and
# do not share any xeno systems (no plasma, no hive, no evolution).
- type: entity
  abstract: true
  parent:
  - BaseMob
  - MobDamageable
  - MobCombat
  - MobBloodstream
  - MobFlammable
  id: AU14AbominationBase
  name: abomination
  components:
  - type: Abomination
  - type: NoSlip
  - type: Climbing
  - type: ComplexInteraction
  - type: StatusEffects
    allowed:
    - Stun
    - KnockedDown
    - SlowedDown
    - Muted
    - Dazed
    - Blinded
    - Unconscious
    - TemporaryBlindness
    - Deaf
  - type: Hands
  - type: GiveHands
    hands:
    - name: Right Hand
      location: Right
    - name: Left Hand
      location: Left
  - type: Body
    prototype: Primate
    requiredLegs: 1
  - type: NpcFactionMember
    factions:
    - Abomination
  - type: UserIFF
    factions:
    - FactionAbomination
  - type: GhostTakeoverAvailable
  - type: GhostRole
    name: Abomination
    description: A twisted mass of flesh hungry for prey.
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    raffle:
      settings: short
  - type: Speech
    speechVerb: Abomination
    speechSounds: Bass
  - type: ReplacementAccent
    accent: genericAggressive
  # Abomination radio channel — see abominationRoles.yml.
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - Abomination
  - type: ActiveRadio
    channels:
    - Abomination
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_RMC14/Interface/map_blips.rsi
      state: warrior
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 4
  - type: NameIdentifier
    group: Abomination

- type: nameIdentifierGroup
  id: Abomination
  maxValue: 999
  prefix: Abomination
