# Grunt: hulking front-line abomination.
# - AbominationLeap = slam (long pounce + knockdown)
# - Long melee range so it can swing across multiple tiles
- type: entity
  parent: AU14AbominationBase
  id: AU14AbominationGrunt
  name: grunt abomination
  description: A bloated, lumbering brute. Each fist is the size of a man's torso.
  components:
  - type: Sprite
    sprite: _AU14/Mobs/Abominations/grunt.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: alive
  - type: GhostRole
    name: Grunt Abomination
    description: A heavy slam-melee abomination. Crush colonists with overwhelming reach.
  - type: MobThresholds
    thresholds:
      0: Alive
      600: Critical
      750: Dead
  - type: MobStateActions
    actions:
      Alive:
      - ActionAbominationGruntSlam
      - ActionAbominationGruntCharge
      - ActionAbominationGruntSpit
      - ActionAbominationGruntAcidSpray
  - type: AbominationLeap
    # Same distance as the spider / runner pounce; grunt's signature
    # distance attack is Charge, not Slam.
    range: 6
    strength: 22
    flightDuration: 0.9
    knockdownTime: 3
    damage:
      types:
        Blunt: 35
  - type: AbominationCharge
    range: 8
    strength: 28
    flightDuration: 1.2
    knockdownTime: 4
    mobDamage:
      types:
        Blunt: 60
        Structural: 50
    structureDamage:
      types:
        Blunt: 250
        Structural: 750
  # Acid spit + cone spray. Same projectile as the spider, but the grunt
  # gets the boiler-style fan to lay down area denial.
  - type: AbominationSpit
    speed: 14
    range: 10
  - type: AbominationAcidSpray
    shots: 7
    spreadDegrees: 50
    speed: 14
    range: 7
  - type: MeleeWeapon
    range: 2
    damage:
      types:
        Slash: 50
  - type: MovementSpeedModifier
    baseWalkSpeed: 1.8
    baseSprintSpeed: 2.8
