# Spider: a skittering severed-head abomination.
# - AbominationLeap = short pounce
# - AbominationSpit = ranged acid projectile
- type: entity
  parent: AU14AbominationBase
  id: AU14AbominationSpider
  name: spider abomination
  description: A skittering, multi-legged head crowned with too many teeth. It wants on your face.
  components:
  - type: Sprite
    sprite: _AU14/Mobs/Abominations/spider.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: alive
  - type: GhostRole
    name: Spider Abomination
    description: A skittering severed head. Pounce onto prey and bury them in acid.
  - type: MobThresholds
    thresholds:
      0: Alive
      360: Dead
  - type: MobStateActions
    actions:
      Alive:
      - ActionAbominationSpiderLeap
      - ActionAbominationSpiderSpit
  - type: AbominationLeap
    # Range matches the xeno runner (XenoLeapComponent.Range default).
    range: 6
    strength: 25
    flightDuration: 0.6
    knockdownTime: 2
    damage:
      groups:
        Brute: 12
  - type: AbominationSpit
  - type: MeleeWeapon
    damage:
      types:
        Slash: 30
  # Doubled sprint speed — spider is the chase caste, it should run people
  # down at xeno-runner pace.
  - type: MovementSpeedModifier
    baseWalkSpeed: 3.2
    baseSprintSpeed: 11.0
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.2
        density: 100
        mask:
        - SmallMobMask
        layer:
        - SmallMobLayer
