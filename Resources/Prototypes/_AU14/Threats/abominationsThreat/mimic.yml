# Mimic: humanoid abomination that assimilates incapacitated humans.
# Combat form. While transformed via AbominationMimicSystem it inherits the
# victim's name/factions/IFF/skills/appearance for the duration.
- type: entity
  parent: AU14AbominationBase
  id: AU14AbominationMimic
  name: mimic abomination
  description: A wet, vaguely humanoid silhouette. Its features won't stop sliding.
  components:
  - type: Sprite
    sprite: _AU14/Mobs/Abominations/mimic.rsi
  - type: GhostRole
    name: Mimic Abomination
    description: Assimilate the downed and disappear into the colony wearing their faces.
  - type: MobThresholds
    thresholds:
      0: Alive
      300: Critical
      400: Dead
  - type: MobStateActions
    actions:
      Alive:
      - ActionAbominationRest
      - ActionAbominationAssimilate
      - ActionAbominationMimicTransform
  - type: AbominationMimic
    transformDuration: 360
  - type: AbominationAssimilate
    doAfter: 8
  # Adds the private Mimicnet alongside the general Abomination band
  # inherited from AU14AbominationBase.
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - Abomination
    - AbominationMimic
  - type: ActiveRadio
    channels:
    - Abomination
    - AbominationMimic
  - type: UserInterface
    interfaces:
      enum.AbominationMimicUiKey.Key:
        type: AbominationMimicBui
  - type: CMArmor
    xenoArmor: 18
    explosionArmor: 15
  - type: MeleeWeapon
    damage:
      groups:
        Brute: 22
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.6
    baseSprintSpeed: 4.4
  - type: RMCSize
    size: Humanoid
