# Standalone abomination action prototypes. Do NOT parent any ActionXeno*
# or ActionApe* — abominations don't share a chassis with either.

# --- Spider ---

- type: entity
  id: ActionAbominationSpiderLeap
  name: Pounce
  description: Pounce onto a target, knocking them down briefly.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: pounce
    useDelay: 5
  - type: TargetAction
    range: 7
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:Content.Shared._AU14.Abominations.Abilities.AbominationLeapActionEvent

- type: entity
  id: ActionAbominationSpiderSpit
  name: Acid Spit
  description: Spit a glob of acid at a target.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: xeno_spit
    useDelay: 3
  - type: TargetAction
    range: 10
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:Content.Shared._AU14.Abominations.Abilities.AbominationSpitActionEvent

# --- Grunt ---

- type: entity
  id: ActionAbominationGruntSlam
  name: Slam
  description: Leap to a position and slam down, knocking enemies prone.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: pounce
    useDelay: 8
  - type: TargetAction
    range: 9
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:Content.Shared._AU14.Abominations.Abilities.AbominationLeapActionEvent

- type: entity
  id: ActionAbominationGruntCharge
  name: Charge
  description: Wind up and barrel forward, smashing through anything in your path.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: ready_charge
    useDelay: 18
  - type: TargetAction
    range: 14
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:Content.Shared._AU14.Abominations.Abilities.AbominationChargeActionEvent

# --- Skitter ---

- type: entity
  id: ActionAbominationPlantKudzu
  name: Spread Kudzu
  description: Vomit out a fast-spreading kudzu source under yourself.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: plant_weeds
    useDelay: 30
  - type: InstantAction
    event: !type:Content.Shared._AU14.Abominations.AbominationPlantKudzuActionEvent

- type: entity
  id: ActionAbominationSecreteWall
  name: Secrete Flesh Wall
  description: Vomit a wall of fused sinew on the tile beneath you.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: secrete_resin
    useDelay: 10
  - type: InstantAction
    event: !type:Content.Shared._AU14.Abominations.Abilities.AbominationSecreteWallActionEvent

# --- Mimic ---

- type: entity
  id: ActionAbominationAssimilate
  name: Assimilate
  description: Begin assimilating an incapacitated humanoid. They will become a mimic too.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: headbite
    useDelay: 2
  - type: TargetAction
    range: 1.5
    checkCanAccess: true
    deselectOnMiss: false
  - type: EntityTargetAction
    event: !type:Content.Shared._AU14.Abominations.AbominationAssimilateActionEvent

- type: entity
  id: ActionAbominationMimicTransform
  name: Mimic
  description: Take the shape of one of your assimilated victims for a limited time.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: place_resin
    useDelay: 5
  - type: InstantAction
    event: !type:Content.Shared._AU14.Abominations.AbominationMimicTransformActionEvent
