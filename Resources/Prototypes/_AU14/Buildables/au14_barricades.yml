# Building overhaul: barricades as normal construction-ghost recipes (instead of the RMC "build here" radial).
# Each is a child of the real barricade entity (inherits its look/health/fold behavior) plus a Construction
# component pointing at a clean ghost graph, so it places with the standard construction ghost. Costs mirror the
# original barricade graphs. All live in the "Barricades" spawnlist.

# --- Metal barricade ---
- type: constructionGraph
  id: AU14BarricadeMetalGraph
  start: start
  graph:
  - node: start
    edges:
    - to: built
      completed:
      - !type:SnapToGrid
      steps:
      - material: CMSteel
        amount: 4
        doAfter: 3
  - node: built
    entity: AU14BarricadeMetal

- type: entity
  parent: CMBarricadeMetal
  id: AU14BarricadeMetal
  suffix: AU14 ghost-build
  components:
  - type: Construction
    graph: AU14BarricadeMetalGraph
    node: built

- type: construction
  id: AU14BarricadeMetalRecipe
  name: metal barricade
  description: A military-grade metal barricade.
  graph: AU14BarricadeMetalGraph
  startNode: start
  targetNode: built
  category: construction-category-structures
  objectType: Structure
  placementMode: SnapgridCenter
  canBuildInImpassable: false
  isCM: true
  spawnlist: AU14
  conditions:
  - !type:TileNotBlocked
  - !type:TileBarricadeClear

