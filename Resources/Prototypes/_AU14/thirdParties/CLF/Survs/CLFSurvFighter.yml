- type: job
  parent: CMJobBase
  id: AU14JobCLFSurvFighter
  name: au14-job-name-clfguerilla
  description: au14-clfsurv-desription
  greeting: au14-clfsurv-greeting
  setPreference: true
  ignoreAllegiance: true
  playTimeTracker: AU14JobCLFGuerilla
  basePlaytimeTracker: true
  ranks:
    RMCRankCivilian: []
  startingGear: AU14GearCLFSurvFighter
  icon: "RMCJobIconCLFSoldier"
  hasIcon: false
  requireAdminNotify: false
  joinNotifyCrew: false
  supervisors: au14-job-supervisors-clflrs
  accessGroups:
  - Colonist
  roleWeight: 0.25
  special:
  - !type:AddComponentSpecial
    components:
    - type: NpcFactionMember
      factions:
      - CLF
    - type: CLFMember
    - type: Skills
      skills:
        RMCSkillEndurance: 1
        RMCSkillFirearms: 2
        RMCSkillConstruction: 2
        RMCSkillEngineer: 3
        RMCSkillFireman: 1
        RMCSkillVehicles: 1
        RMCSkillPolice: 1
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: synth
    - type: ShowMarineIcons
      factions:
      - CLF
  hidden: false

- type: entity
  parent: AU14BaseMobSpeciesOrganicBaseMilitary
  id: AU14SurvCLFFighter
  name: CLF Fighter (Survivor)
  components:
  - type: GhostTakeoverAvailable
  - type: GhostRole
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    name: au14-job-name-clfguerilla
    description: au14-clfsurv-desription
    reregister: false
    job: AU14JobCLFSurvFighter
    raffle:
      settings: short
    rules: au14-clfsurv-desription

- type: startingGear
  id: AU14GearCLFSurvFighter
  equipment:
    id: AU14IDCardCLFCivilian
    neck: RMCCLFArmband
  inhand:
  - AU14CLFHeadset

