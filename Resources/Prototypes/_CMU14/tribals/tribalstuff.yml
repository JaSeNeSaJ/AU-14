# Tribal Weapons

- type: entity
  name: tribal spear
  parent: Spear
  id: TribalSpear
  description: A spear crafted by tribal warriors. Vicious when stabbed, lethal when thrown.
  components:
  - type: Tag
    tags:
    - Spear
    - tribe
  - type: Sprite
    sprite: Objects/Weapons/Melee/bone_spear.rsi
  # Stab — 50 piercing.
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Piercing: 50
    angle: 0
    animation: WeaponArcThrust
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  # Throw — 140 piercing on impact via DamageOtherOnHit.
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 140

# Tribal arrow — 130 piercing on hit. Goes in the quiver, fired from
# TribalBow / BowImprovised.
- type: entity
  parent: ArrowImprovised
  id: TribalArrow
  name: bone arrow
  description: A barbed bone-tipped shaft fletched with feathers. Hits like a bus.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/arrows.rsi
    layers:
    - state: tail
      color: tan
    - state: rod
      color: brown
    - state: tip
      color: ivory
    - state: solution1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
  - type: Projectile
    damage:
      types:
        Piercing: 130

- type: entity
  name: tribal bow
  parent: BaseBow
  id: TribalBow
  description: A crude bow made by tribal warriors. Only usable by tribals.
  components:
  - type: Tag
    tags:
    - tribe
  - type: Sprite
    layers:
    - state: unwielded
      map: [ base ]
    - state: unwielded-arrow
      map: [ arrow ]
      visible: false
    - state: unwielded-plunger
      map: [ plunger ]
      visible: false
  - type: Appearance
  - type: ItemMapper
    spriteLayers:
    - arrow
    - plunger
    mapLayers:
      arrow:
        whitelist:
          tags:
          - Arrow
      plunger:
        whitelist:
          tags:
          - Plunger
  - type: GenericVisualizer
    visuals:
      enum.WieldableVisuals.Wielded:
        arrow:
          True: { state: wielded-arrow }
          False: { state: unwielded-arrow }
        plunger:
          True: { state: wielded-plunger }
          False: { state: unwielded-plunger }
        base:
          True: { state: wielded }
          False: { state: unwielded }


- type: Tag
  id: tribe

# Tribal faction — hostile to colony, marines, xenos, abominations, etc.
# Mirrors the threat lists used by CMUAPE / RMCXeno.
- type: npcFaction
  id: Tribe
  hostile:
  - UNMC
  - NanoTrasen
  - SPP
  - GOVFOR
  - OPFOR
  - Halcyon
  - WeYa
  - Civilian
  - CLF
  - TSE
  - AUColonist
  - CMUAPE
  - RMCXeno
  - Abomination

