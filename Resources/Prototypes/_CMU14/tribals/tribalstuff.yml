# Abstract base for every tribal mob variant. The three concrete variants
# (leader / spear / bowman) parent this and slot a job + starting-gear.
- type: entity
  save: false
  abstract: true
  parent: RMCBaseMobSpeciesOrganic
  id: CMUMobTribal
  name: Tribal
  suffix: CMU14
  components:
  - type: Tribal
  # RandomHumanoidAppearance rolls a fresh humanoid profile on map-init; we
  # tell it not to set the entity name because RandomMetadata is responsible
  # for the Na'vi-flavoured first-name + clan name combo. Skin is applied
  # after the roll by TribalAppearanceSystem.
  - type: RandomHumanoidAppearance
    randomizeName: false
  - type: RandomMetadata
    nameSegments:
    - NamesTribalFirst
    - NamesTribalClan
    nameFormat: name-format-tribal
  # Override the base species faction — tribals defend the homeworld, they
  # aren't on the AUColonist team. Their own Tribe faction is hostile to
  # everyone else so they fight invaders on sight.
  - type: NpcFactionMember
    factions:
    - Tribe

# --- Job + role prototypes -----------------------------------------------

- type: job
