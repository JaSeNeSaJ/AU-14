- type: entity
  parent: CMGrenadeBase
  id: CMUPipeBomb
  name: pipe bomb
  description: A cheap way to injure someone. Designed by your local insurgent’s.
  components:
  - type: Sprite
    sprite: _CMU14/Items/pipebomb.rsi
    layers:
    - state: base
      map: ["enum.TriggerVisualLayers.Base"]
    - state: wires
  - type: ExplodeOnTrigger
  - type: Explosive
    maxIntensity: 20
    intensitySlope: 8
    totalIntensity: 100
    deleteAfterExplosion: false
  - type: OnUseTimerTrigger
    examinable: false
    initialBeepDelay: 0
    beepSound: /Audio/Effects/lightburn.ogg
  - type: RandomTimerTrigger
    min: 1
    max: 4
  - type: ProjectileGrenade
    fillPrototype: CMProjectileShrapnel
    capacity: 20
  - type: ContainerContainer
    containers:
      cluster-payload: !type:Container
  - type: CMExplosionEffect
  - type: CMVocalizeTrigger
  - type: RMCScorchEffect

- type: entity
  parent: BaseItem
  id: CMUPipeBombFuse
  name: pipe bomb
  description: Incomplete. Seems like it need Paper as the fuse
  suffix: Fuse
  components:
  - type: Sprite
    sprite: _CMU14/Items/pipebomb.rsi
    state: base
  - type: CraftIntoPipeBomb
    Spawn: CMUPipeBomb
    NeedWires: true
    DestroyReq: true
    Time: 2

- type: entity
  parent: BaseItem
  id: CMUPipeBombCasing
  name: pipe bomb
  description: Empty casing. Seems like it need lighter.
  suffix: Casing
  components:
  - type: Sprite
    sprite: _CMU14/Items/pipebomb.rsi
    state: base
  - type: CraftIntoPipeBomb
    Spawn: CMUPipeBombFuse
    NeedLighter: true
    DestroyReq: true
    Time: 2
