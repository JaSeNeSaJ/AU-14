- type: entity
  parent: BaseItem
  id: CMUUniversalPaperTool
  name: Universal Paper Tool
  description: A compact document fabrication device manufactured by Weyland-Yutani's Communications & Research and Development Division. Designed for rapid field administration, it accepts standardized paper stock and prints pre-authorized corporate, military, and governmental stationery from its internal template library. Do not ask where the ink comes from.
  components:
  - type: Sprite
    sprite: _CMU14/Items/universal_paper_tool.rsi
    state: icon
  - type: Item
    size: Small
    sprite: _CMU14/Items/universal_paper_tool.rsi
  - type: ActivatableUI
    key: enum.UniversalPaperToolUiKey.Key
    requiresComplex: false
  - type: UserInterface
    interfaces:
      enum.UniversalPaperToolUiKey.Key:
        type: UniversalPaperToolBui
  - type: ItemSlots
    slots:
      paper_slot:
        name: cmu-universal-paper-tool-paper-slot-name
        insertSound: /Audio/Machines/scanning.ogg
        ejectSound: /Audio/Machines/tray_eject.ogg
        insertOnInteract: true
        ejectOnInteract: false
        whitelist:
          tags:
          - Paper
        insertSuccessPopup: cmu-universal-paper-tool-paper-inserted
        whitelistFailPopup: cmu-universal-paper-tool-paper-invalid
  - type: UniversalPaperTool
    printSound:
      path: /Audio/Machines/circuitprinter.ogg
    templates:
    - prototype: CMUPaperBase #Regular papers
      name: white paper
      description: A crisp, bright sheet with a timeless appearance.
    - prototype: CMUPaperCream
      name: cream paper
      description: A warm-toned sheet with a soft, elegant finish.
    - prototype: CMUPaperIvory
      name: ivory paper
      description: A lightly tinted sheet with a refined look.
    - prototype: CMUPaperGray
      name: gray paper
      description: A muted sheet with a subtle, modern appearance.
